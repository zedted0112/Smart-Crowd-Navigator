<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadium Navigator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="map-container">
        <!-- SVG Canvas for Map -->
        <svg id="venue-svg" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
            <g id="zones"></g>
            <!-- Background paths drawn in light gray -->
            <g id="all-paths"></g>
            <g id="active-path-original"></g>
            <g id="active-path-optimized"></g>
            <g id="nodes"></g>
        </svg>
    </div>

    <!-- UI Overlay -->
    <div id="control-panel" class="panel">
        <h1>Stadium Navigator</h1>
        
        <div class="destinations">
            <button class="btn" onclick="navigateTo('food')">Go to Food</button>
            <button class="btn" onclick="navigateTo('washroom')">Go to Washroom</button>
            <button class="btn" onclick="navigateTo('seat')">Go to Seat A12</button>
        </div>

        <div id="route-info" class="info-card" style="display: none;">
            <h3>Navigation Info</h3>
            <p><strong>Destination:</strong> <span id="info-dest">None</span></p>
            <p><strong>ETA:</strong> <span id="info-eta">-- mins</span></p>
            <p id="info-congestion" class="alert-text"></p>
            <p id="info-alert" class="alert-text"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
