<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Venue | Crowd Navigator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="map-container">
        <!-- SVG Canvas for Map -->
        <svg id="venue-svg" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
            <g id="grid-layer"></g>
            <g id="obstacles-layer"></g>
            <g id="seats-layer"></g>
            <!-- Background paths -->
            <g id="all-paths"></g>
            <g id="active-path-original"></g>
            <g id="active-path-optimized"></g>
            <g id="nodes"></g>
            <g id="people-layer"></g>
            <g id="user-layer"></g>
        </svg>

        <!-- Left Navigation Panel -->
        <div id="control-panel" class="panel">
            <h1>Venue IQ</h1>
            
            <div class="destinations">
                <h4>Scenarios</h4>
                <div class="btn-group">
                    <button id="btn-normal" class="btn active" onclick="setScenario('normal')">Standard Mode</button>
                    <button id="btn-washroom" class="btn" onclick="setScenario('washroom')">Facility Rush</button>
                    <button id="btn-food" class="btn" onclick="setScenario('food')">Dining Peak</button>
                </div>

                <h4>Quick Navigate</h4>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="navigateTo('food')">Food Court</button>
                    <button class="btn btn-primary" onclick="navigateTo('washroom')">Washroom</button>
                    <button class="btn btn-primary" onclick="navigateTo('seat')">Assigned Seat</button>
                    <button class="btn" onclick="navigateToFriend()" style="background: rgba(217, 70, 239, 0.15); color: #d946ef; border-color: rgba(217, 70, 239, 0.3);">Track Friend</button>
                </div>
            </div>

            <div id="route-info" class="info-card" style="display: none;">
                <h3>Navigation Stream</h3>
                <p>Target: <span id="info-dest" style="color: var(--text-primary);">--</span></p>
                <p>ETA: <span id="info-eta" style="color: var(--text-primary);">--</span></p>
                <p id="info-crowd-density" class="alert-text"></p>
                <p id="info-congestion" class="alert-text alert-red"></p>
                <p id="info-alert" class="alert-text alert-blue"></p>
            </div>
        </div>

        <!-- Right Dashboard -->
        <div class="dashboard-panel">
            <div class="dash-section">
                <h4>Environment Controls</h4>
                <div class="control-item">
                    <label>Crowd Density <span id="val-density">80</span></label>
                    <input type="range" id="ctrl-density" min="10" max="250" value="80">
                </div>
                <div class="control-item">
                    <label>Simulation Speed <span id="val-speed">1x</span></label>
                    <input type="range" id="ctrl-speed" min="0.1" max="3" step="0.1" value="1">
                </div>
                <div class="control-item" style="display: flex; align-items: center; justify-content: flex-start; gap: 10px; cursor: pointer;">
                    <input type="checkbox" id="ctrl-corridor" checked style="width: auto;">
                    <label style="margin-bottom: 0; color: var(--text-primary);">Flow Constraints</label>
                </div>
            </div>

            <div class="dash-section">
                <h4>Engine Logic</h4>
                <div class="control-item" style="display: flex; align-items: center; justify-content: flex-start; gap: 10px; cursor: pointer; margin-bottom: 12px;">
                    <input type="checkbox" id="ctrl-smart-routing" checked style="width: auto;">
                    <label style="margin-bottom: 0; color: var(--text-primary);">AI Rerouting</label>
                </div>
                <div class="control-item">
                    <label>Reroute Aggression</label>
                    <select id="ctrl-detour-mode">
                        <option value="local">Localized Detour</option>
                        <option value="full">Global Pathing</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>Block Sensitivity <span id="val-sensitivity">3</span></label>
                    <input type="range" id="ctrl-sensitivity" min="1" max="10" value="3">
                </div>
            </div>

            <div class="dash-section">
                <h4>Real-time Telemetry</h4>
                <div class="feedback-card">
                    <div class="feedback-row">
                        <span>Active Vector</span>
                        <span class="feedback-val" id="feed-route-type">Primary</span>
                    </div>
                    <div class="feedback-row">
                        <span>System Traffic</span>
                        <span class="feedback-val" id="feed-congestion">Optimal</span>
                    </div>
                    <div class="feedback-row">
                        <span>Path Obstruction</span>
                        <span class="feedback-val"><span id="feed-people-path">0</span> units</span>
                    </div>
                </div>
            </div>

            <p style="font-size: 10px; color: var(--text-secondary); opacity: 0.6; text-align: center;">Shift + Click to manually place congestion zones.</p>
            <button class="btn" id="btn-reset" style="width: 100%; margin-top: 16px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.2); text-align: center; justify-content: center;">Restart Simulation</button>
        </div>

        <!-- Legend -->
        <div class="legend">
            <div class="legend-item"><span class="dot" style="background: var(--user-color);"></span> User</div>
            <div class="legend-item"><span class="dot" style="background: var(--friend-color);"></span> Friend</div>
            <div class="legend-item"><span class="line" style="background: var(--path-active);"></span> Fast Route</div>
            <div class="legend-item"><span class="line" style="background: var(--accent-pink); border: 1px dashed white;"></span> Congested</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
